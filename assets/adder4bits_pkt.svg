  <text x="42" y="195" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4A5568">Wrapper mapping: data_bus_out[12:9]=a_i, [8:5]=b_i, [4:1]=s_o, [0]=c_o</text>
